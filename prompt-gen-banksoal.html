<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Q&A Prompt Generator</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css"
      rel="stylesheet"
    />
    <style>
      /* Nuansa warna edukasi */
      body {
        background-color: #f8f9fa;
        color: #343a40;
      }
      header,
      footer {
        background-color: #007bff;
        color: white;
        padding: 15px 0;
      }
      /* Garis tegas pada form */
      .form-control,
      .form-check-input,
      .form-control-color {
        border: 2px solid #007bff;
        border-radius: 5px;
        box-shadow: none;
      }
      .form-control:focus,
      .form-check-input:focus,
      .form-control-color:focus {
        border-color: #0056b3;
        box-shadow: 0 0 0 0.2rem rgba(0, 123, 255, 0.25);
      }
      /* Tombol */
      .btn-primary {
        background-color: #007bff;
        border: 2px solid #007bff;
      }
      .btn-primary:hover {
        background-color: #0056b3;
        border-color: #0056b3;
      }
      .btn-secondary {
        background-color: #6c757d;
        border: 2px solid #6c757d;
      }
      .btn-secondary:hover {
        background-color: #5a6268;
        border-color: #5a6268;
      }
    </style>
  </head>
  <body>
    <header class="text-center">
      <h1>Aplikasi Guru Cerdas</h1>
      <p>Solusi agar murid cepat pintar</p>
    </header>

    <div class="container mt-5">
      <form id="promptForm" class="mt-4">
        <!-- Nama Guru -->
        <div class="mb-3">
          <label for="teacherName" class="form-label">Nama Guru</label>
          <input
            type="text"
            class="form-control"
            id="teacherName"
            placeholder="Masukkan nama guru"
          />
        </div>

        <!-- Pertanyaan -->
        <div class="mb-3">
          <label for="questions" class="form-label"
            >Pertanyaan (maksimal 50)</label
          >
          <textarea
            class="form-control"
            id="questions"
            rows="5"
            placeholder="Masukkan pertanyaan, pisahkan dengan enter."
            oncontextmenu="return true;"
          ></textarea>
        </div>

        <!-- Apresiasi Jawaban -->
        <div class="mb-3">
          <label for="correctAppreciation" class="form-label"
            >Apresiasi Jawaban Benar</label
          >
          <input
            type="text"
            class="form-control"
            id="correctAppreciation"
            placeholder="Masukkan apresiasi untuk jawaban benar"
          />
        </div>
        <div class="mb-3">
          <label for="incorrectAppreciation" class="form-label"
            >Apresiasi Jawaban Salah</label
          >
          <input
            type="text"
            class="form-control"
            id="incorrectAppreciation"
            placeholder="Masukkan apresiasi untuk jawaban salah"
          />
        </div>

        <!-- Pilihan Warna -->
        <div class="mb-3">
          <label for="colorChoice" class="form-label">Pilih Warna Tema</label>
          <input
            type="color"
            class="form-control form-control-color"
            id="colorChoice"
            value="#563d7c"
          />
        </div>

        <!-- Warna Header, Footer, Body, dan Card -->
        <div class="mb-3">
          <label for="headerColor" class="form-label">Warna Header</label>
          <input
            type="color"
            class="form-control form-control-color"
            id="headerColor"
            value="#007bff"
          />
        </div>
        <div class="mb-3">
          <label for="footerColor" class="form-label">Warna Footer</label>
          <input
            type="color"
            class="form-control form-control-color"
            id="footerColor"
            value="#007bff"
          />
        </div>
        <div class="mb-3">
          <label for="bodyColor" class="form-label">Warna Body</label>
          <input
            type="color"
            class="form-control form-control-color"
            id="bodyColor"
            value="#f8f9fa"
          />
        </div>
        <div class="mb-3">
          <label for="cardColor" class="form-label">Warna Card</label>
          <input
            type="color"
            class="form-control form-control-color"
            id="cardColor"
            value="#ffffff"
          />
        </div>

        <!-- Checkbox Options -->
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="useMultipleChoice"
          />
          <label class="form-check-label" for="useMultipleChoice">
            Gunakan format Multiple Choice (A, B, C, D)
          </label>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="useVoice"
            value="jawaban dibacakan"
          />
          <label class="form-check-label" for="useVoice">
            Gunakan Voice untuk pertanyaan dan jawaban
          </label>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="questionReadAloud"
            value="soal dibacakan"
          />
          <label class="form-check-label" for="questionReadAloud">
            Soal Dibacakan
          </label>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="randomizeQuestions"
            value="soal dibuat random"
          />
          <label class="form-check-label" for="randomizeQuestions">
            Soal Random (Pastikan Jawaban Benar)
          </label>
        </div>
        <div class="form-check mb-3">
          <input
            class="form-check-input"
            type="checkbox"
            id="teacherNameInFooter"
            value="nama guru letakan di footer"
          />
          <label class="form-check-label" for="teacherNameInFooter">
            Nama Guru di Footer
          </label>
        </div>

        <!-- Textarea untuk Perintah Tambahan -->
        <div class="mb-3">
          <label for="additionalCommands" class="form-label"
            >Perintah Tambahan</label
          >
          <textarea
            class="form-control"
            id="additionalCommands"
            rows="3"
            placeholder="Masukkan perintah tambahan untuk prompt"
          ></textarea>
        </div>

        <!-- Tombol Submit -->
        <button type="submit" class="btn btn-primary">Generate Prompt</button>
        <button id="clearPromptForm" class="btn btn-danger ms-2" type="button">
          Hapus Prompt
        </button>
      </form>

      <!-- Hasil Prompt -->
      <div class="mt-4">
        <h2>Generated Prompt:</h2>
        <pre id="generatedPrompt"></pre>
        <button id="copyPrompt" class="btn btn-secondary mt-2" type="button">
          Copy Prompt
        </button>
        <button
          id="clearGeneratedPrompt"
          class="btn btn-danger mt-2"
          type="button"
        >
          Hapus Hasil
        </button>
      </div>

      <!-- Space untuk Banner Sponsor -->
      <div class="mt-5 text-center">
        <h3>Supported by:</h3>
        <div
          id="sponsorBanner"
          class="p-3"
          style="border: 2px solid #007bff; background-color: #e9ecef"
        >
          <p>Space untuk banner sponsor</p>
        </div>
      </div>
    </div>

    <footer class="text-center mt-5">
      <p>&copy; 2024 Q&A Application Prompt Generator. All rights reserved.</p>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
      document
        .getElementById('promptForm')
        .addEventListener('submit', function (e) {
          e.preventDefault();

          // Mengambil nilai dari form
          const teacherName = document.getElementById('teacherName').value;
          const questions = document
            .getElementById('questions')
            .value.split('\n')
            .slice(0, 50);
          const correctAppreciation = document.getElementById(
            'correctAppreciation'
          ).value;
          const incorrectAppreciation = document.getElementById(
            'incorrectAppreciation'
          ).value;
          const colorChoice = document.getElementById('colorChoice').value;
          const headerColor = document.getElementById('headerColor').value;
          const footerColor = document.getElementById('footerColor').value;
          const bodyColor = document.getElementById('bodyColor').value;
          const cardColor = document.getElementById('cardColor').value;
          const useMultipleChoice = document.getElementById('useMultipleChoice')
            .checked
            ? 'Ya'
            : 'Tidak';
          const useVoice = document.getElementById('useVoice').checked
            ? 'Ya'
            : 'Tidak';
          const questionReadAloud = document.getElementById('questionReadAloud')
            .checked
            ? 'Soal akan dibacakan.'
            : '';
          const randomizeQuestions = document.getElementById(
            'randomizeQuestions'
          ).checked
            ? 'Soal akan dibuat random dengan memastikan jawaban benar.'
            : '';
          const teacherNameInFooter = document.getElementById(
            'teacherNameInFooter'
          ).checked
            ? `Nama guru ${teacherName} akan diletakkan di footer aplikasi.`
            : '';
          const additionalCommands =
            document.getElementById('additionalCommands').value;

          // Kalimat default tambahan
          const defaultPrompt = `
Buatkan saya aplikasi Q & A dengan menggunakan HTML, JavaScript, dan Bootstrap. Pastikan voice menggunakan bahasa Indonesia asli dengan suara orang Indonesia asli. 
Pastikan sebelum mengakses soal soal harus mengisi nama murid terlebih dahulu dan selanjutnya muncul suara ( Soal soal pelajaran ini dibuat oleh Guru ${teacherName} )
Pastikan setelah jawaban dipilih, muncul suara yang mengatakan benar atau salah.
Pastikan juga muncul score di setiap menjawab soal.
pastikan semua soal yang diminta Anda tampilkan.
pastikan Jumlah Soal 50.
Pastikan juga di akhir soal ada ucapan apresiasi dengan kalimat maupun suara.
Pastikan selalu menyebut Nama Murid (${teacherName}) setiap kali voice diaktifkan.
Pastikan pisisi header konten tengah dan footer seimbang dengan margin yang tidak terlalu dekat, Dan anda juga harus ikuti semua permintaan dengan tepat termasuk poin poin dibawah ini, Akses quiz harus memasukan Nama pengguna ( Nama Murid ) yaitu murid. Format pertanyaan seperti dibawah ini dibuat rata kiri tanpa background: 
( Siapa presiden pertama indonesia ?
a. Sukarno
b. Suharto
c. megawati
d. Jokowi 
)
            `;

          // Membuat prompt naratif dalam bentuk poin-poin
          const prompt = `
- Guru: ${teacherName}
- Pertanyaan (maksimal 50): ${questions.join(', ')}
- Apresiasi Jawaban Benar: "${correctAppreciation}"
- Apresiasi Jawaban Salah: "${incorrectAppreciation}"
- Warna Tema: ${colorChoice}
- Warna Header: ${headerColor}
- Warna Footer: ${footerColor}
- Warna Body: ${bodyColor}
- Warna Card: ${cardColor}
- Format Aplikasi Quiz Multiple Choice: ${useMultipleChoice}
- Fitur Voice: ${useVoice}
${questionReadAloud ? '- Soal Dibacakan.' : ''}
${randomizeQuestions ? '- Soal akan dibuat random dengan memastikan jawaban benar.' : ''}
${teacherNameInFooter ? `- Nama Guru di Footer: ${teacherName}` : ''}
${additionalCommands ? `- Perintah Tambahan: ${additionalCommands}` : ''}
${defaultPrompt}`;

          // Menampilkan prompt yang dihasilkan
          document.getElementById('generatedPrompt').textContent = prompt;
        });

      // Fungsi untuk menyalin prompt ke clipboard
      document
        .getElementById('copyPrompt')
        .addEventListener('click', function () {
          const promptText =
            document.getElementById('generatedPrompt').textContent;
          navigator.clipboard.writeText(promptText).then(() => {
            alert('Prompt berhasil disalin ke clipboard!');
          });
        });

      // Fungsi untuk menghapus prompt yang dihasilkan
      document
        .getElementById('clearGeneratedPrompt')
        .addEventListener('click', function () {
          document.getElementById('generatedPrompt').textContent = '';
        });

      // Fungsi untuk menghapus isi form
      document
        .getElementById('clearPromptForm')
        .addEventListener('click', function () {
          document.getElementById('promptForm').reset();
        });

      // Menonaktifkan klik kanan, kecuali pada textarea
      document.addEventListener('contextmenu', function (e) {
        if (e.target.tagName !== 'TEXTAREA') {
          e.preventDefault();
        }
      });
    </script>
  </body>
</html>

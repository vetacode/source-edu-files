<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Auto Feed Products</title>

    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"
    />

    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
      }
    </style>
  </head>
  <body>
    <div class="max-w-7xl mx-auto px-4 py-10">
      <div
        id="productGrid"
        class="grid grid-cols-2 md:grid-cols-4 gap-4 sm:gap-5"
      ></div>
      <div id="errorMsg" class="text-center text-red-500 mt-4"></div>
    </div>

    <!-- PRODUCTS FETCH -->
    <script>
      /* =========================
   CONFIG (EDIT DI SINI SAJA) 
========================= */
      const CONFIG = {
        url: 'https://carisolusi.biz.id/kategori/',
        limit: 8,

        selectors: {
          card: '.product-item',
          title: '.product_name a',
          priceWrap: '.product_price',
          img: '.product-thumb',
          link: '.product_name a',
          sold: '.fa-eye',
        },
      };

      /* =========================
   UTILITIES
========================= */

      // Format Rupiah
      function IDR(num) {
        return 'Rp ' + Number(num || 0).toLocaleString('id-ID');
      }

      // Random rating 4.0 - 5.0
      function randomRating() {
        return (Math.random() * 1 + 4).toFixed(1);
      }

      // Random sold
      function randomSold() {
        return Math.floor(Math.random() * 900 + 100) + '+';
      }

      // Truncate text rapi
      function truncate(text, max) {
        if (!text) return '';
        if (text.length <= max) return text;

        let cut = text.substring(0, max);
        return cut.substring(0, cut.lastIndexOf(' ')) + '...';
      }

      // Extract number dari string harga
      function extractPrice(text) {
        if (!text) return 0;
        return text.replace(/[^\d]/g, '');
      }

      /* =========================
   FETCH & PARSE
========================= */

      async function fetchProducts() {
        try {
          const res = await fetch(CONFIG.url);
          if (!res.ok) throw new Error('Fetch gagal');

          const html = await res.text();
          const doc = new DOMParser().parseFromString(html, 'text/html');

          const items = doc.querySelectorAll(CONFIG.selectors.card);

          let products = [];

          items.forEach((el, i) => {
            if (i >= CONFIG.limit) return;

            const imgEl = el.querySelector(CONFIG.selectors.img);
            const titleEl = el.querySelector(CONFIG.selectors.title);
            const priceEl = el.querySelector(CONFIG.selectors.price);
            const oldEl = el.querySelector(CONFIG.selectors.old);
            const linkEl = el.querySelector(CONFIG.selectors.link);
            const soldEl = el.querySelector(CONFIG.selectors.sold);

            let sold = '0';

            if (soldEl) {
              sold = soldEl.parentElement.innerText.replace(/[^\d]/g, '');
            }

            let imgStyle = imgEl?.getAttribute('style') || '';

            // extract url dari background-image
            let img = '';
            const match = imgStyle.match(/url\(['"]?(.*?)['"]?\)/);

            if (match && match[1]) {
              img = match[1];
            }
            let title = truncate(titleEl?.innerText || 'Produk', 60);
            const priceWrap = el.querySelector(CONFIG.selectors.priceWrap);

            let price = 0;
            let old = 0;

            if (priceWrap) {
              const priceText = priceWrap.childNodes[0]?.textContent || '';
              const oldText = priceWrap.querySelector('span')?.innerText || '';

              price = extractPrice(priceText);
              old = extractPrice(oldText) || price * 1.3;
            }
            let link = linkEl?.href || '#';

            // kategori dari ALT
            let cat = 'Produk Digital'; // atau mapping manual kalau mau

            // fix path relatif
            if (img && !img.startsWith('http')) {
              img = 'https://carisolusi.biz.id' + img;
            }

            products.push({
              img,
              title,
              price,
              old,
              link,
              cat,
              rating: randomRating(),
              sold: randomSold(),
            });
          });

          renderProducts(products);
        } catch (err) {
          document.getElementById('errorMsg').innerText = 'Gagal memuat data';
          console.error(err);
        }
      }

      /* =========================
   RENDER UI
========================= */

      function renderProducts(products) {
        const grid = document.getElementById('productGrid');

        grid.innerHTML = products
          .map((p) => {
            const label =
              p.price > 0 && p.old > 0
                ? `${Math.round((1 - p.price / p.old) * 100)}% OFF`
                : 'SALE';
            return `
  <article onclick="window.open('${p.link}','_blank')"
    class="group bg-white rounded-2xl overflow-hidden border border-slate-100 card-hover cursor-pointer">
      <div class="relative img-zoom overflow-hidden">
        <img src="${p.img}" alt="${p.title}" class="w-full h-40 sm:h-48 object-cover"/>

        <button class="absolute top-3 right-3 w-9 h-9 rounded-full bg-white/90 hover:bg-white text-slate-600 hover:text-rose-500 flex items-center justify-center shadow-soft">
          <i class="fa-solid fa-heart"></i>
        </button>

        <span class="absolute top-3 left-3 text-[10px] font-bold uppercase bg-accent-500 text-white px-2 py-1 rounded-full">
          ${label}
        </span>
      </div>

      <div class="p-4">
        <div class="text-[11px] uppercase tracking-wide text-slate-400 font-semibold">
          ${p.cat}
        </div>

       <h3 class="font-semibold text-sm sm:text-base text-ink mt-1 line-clamp-2 min-h-[2.6rem]">
  <a href="${p.link}" target="_blank" class="hover:text-brand-600">
    ${p.title}
  </a>
</h3>

        <div class="flex items-center gap-1 text-xs text-slate-500 mt-1">
          <i class="fa-solid fa-star text-yellow-500"></i>
          ${p.rating}
          <span class="text-slate-300">·</span>
          Terjual ${p.sold}
        </div>

        <div class="mt-2 flex items-end justify-between">
          <div>
            <div class="text-brand-700 font-extrabold text-sm sm:text-base">
              ${IDR(p.price)}
            </div>
            <div class="text-[11px] text-slate-400 line-through">
              ${IDR(p.old)}
            </div>
          </div>

          <a href="https://wa.me/6281384072641?text=Halo,%20saya%20tertarik%20dengan%20${encodeURIComponent(p.title)}"
          onclick="event.stopPropagation()"
            target="_blank"
            class="inline-flex items-center justify-center w-9 h-9 rounded-full bg-brand-600 hover:bg-brand-700 text-white">
            <i class="fa-solid fa-bag-shopping"></i>
          </a>
        </div>
      </div>
    </article>
  `;
          })
          .join('');
      }

      /* =========================
   INIT
========================= */

      fetchProducts();
    </script>
  </body>
</html>
